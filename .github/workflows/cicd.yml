name: Secure Java CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-test-security:
    name: Build, Test, Lint and Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Run unit tests
        run: mvn clean test

      - name: Run code linting
        run: mvn checkstyle:checkstyle

      - name: Run SAST with Semgrep
        run: |
          python -m pip install semgrep
          semgrep scan --config p/java --error

      - name: Run dependency vulnerability scan
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

      - name: Build application package
        run: mvn package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-note-jar
          path: target/*.jar

  deploy-staging:
    name: Simulated Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-test-security
    environment: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-note-jar

      - name: Simulate staging deployment
        run: |
          echo "Deploying Secure Note application to staging environment"
          echo "Artifact downloaded successfully"
          ls -la

  deploy-production:
    name: Simulated Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Simulate production deployment
        run: |
          echo "Deploying Secure Note application to production environment"
          echo "Production deployment completed successfully"